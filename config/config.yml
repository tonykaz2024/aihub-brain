# aihub-brain — configurație centrală
# Chei găsite din storage.sqlite OmniRoute

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  admin_chat_id: "${TELEGRAM_ADMIN_CHAT_ID}"

docker:
  socket: "/var/run/docker.sock"

# OmniRoute — cheia default-client functioneaza pentru /v1/chat/completions
omniroute:
  base_url: "http://192.168.10.50:20128"
  api_key: "sk-66073e087fb8cbec-060e8f-faeaf81f"
  combos:
    martin_brain: "martin-brain"
    coding_main: "coding-main"
    cc_failover: "cc-failover"

services:
  - name: omniroute
    container: omniroute
    port: 20128
    health_url: "http://localhost:20128/v1/models"
    health_auth: "Bearer sk-66073e087fb8cbec-060e8f-faeaf81f"
    priority: P0
    specialist: agents.omniroute_watcher
    restart_allowed: true

  - name: hermes-gateway
    container: hermes-gateway
    priority: P0
    specialist: agents.hermes_watcher
    restart_allowed: true

  - name: agent-zero
    container: agent-zero
    port: 50001
    health_url: "http://localhost:50001/"
    priority: P0
    specialist: agents.a0_watcher
    restart_allowed: false

  - name: openwebui
    container: openwebui
    port: 3000
    health_url: "http://localhost:3000/"
    priority: P0
    specialist: agents.general_watcher
    restart_allowed: true

  - name: whisper
    container: whisper
    port: 8082
    health_url: "http://localhost:8082/v1/models"
    priority: P0
    specialist: agents.general_watcher
    restart_allowed: true

  - name: deer-flow-gateway
    container: deer-flow-gateway
    priority: P1
    specialist: agents.general_watcher
    restart_allowed: true

  - name: multica
    container: multica-server
    priority: P1
    specialist: agents.general_watcher
    restart_allowed: true

thresholds:
  restart_loop_count: 3
  error_rate_per_min: 10
  check_interval_sec: 30
  memory_limit_pct: 90
